name: Run SMP Server (3h test)
on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'Hours to run'
        required: true
        default: '3'

jobs:
  run-server:
    runs-on: ubuntu-latest
    timeout-minutes: 200
    
    steps:
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      
      - name: Download SMP build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download v1.0 --repo Gteeri/hopneo-server-builds --pattern "SMP-build.zip" --output SMP-build.zip
          unzip -q SMP-build.zip -d server
          echo "Downloaded and extracted SMP build"
          ls -la server/
      
      - name: Fix server.properties for hosting
        run: |
          cd server
          # Set online-mode false, port 25565, lower view distance
          sed -i 's/server-port=25567/server-port=25565/' server.properties
          sed -i 's/view-distance=10/view-distance=6/' server.properties
          sed -i 's/simulation-distance=10/simulation-distance=6/' server.properties
          sed -i 's/max-players=200/max-players=20/' server.properties
          echo "Server port set to 25565"
          cat server.properties | grep -E "server-port|online-mode|max-players|view-distance"
      
      - name: Accept EULA
        run: |
          cd server
          echo "eula=true" > eula.txt
      
      - name: Install playit.gg
        run: |
          curl -SsL https://playit-cloud.github.io/ppa/key.gpg | sudo apt-key add -
          sudo curl -SsL -o /etc/apt/sources.list.d/playit-cloud.list https://playit-cloud.github.io/ppa/playit-cloud.list
          sudo apt update -y
          sudo apt install playit -y
          echo "playit.gg installed"
      
      - name: Start playit tunnel
        run: |
          # Start playit in background
          playit start > playit_output.txt 2>&1 &
          PLAYIT_PID=$!
          echo "playit PID: $PLAYIT_PID"
          
          # Wait for tunnel to initialize
          sleep 15
          
          # Show output
          echo "=== playit output ==="
          cat playit_output.txt
          
          # Try to get tunnel address from playit
          playit list 2>&1 || true
          
          # Also try to extract from logs
          grep -oP '[\w-]+\.playit\.gg:\d+' playit_output.txt || true
          
          # Keep playit running
          echo "playit tunnel started"
      
      - name: Start Minecraft server
        run: |
          cd server
          # Start server in background with reduced RAM
          java -Xms1G -Xmx3G -XX:+UseG1GC -jar folia.jar nogui > server_output.txt 2>&1 &
          SERVER_PID=$!
          echo "Server PID: $SERVER_PID"
          
          # Wait for server to start
          echo "Waiting for server to start..."
          for i in $(seq 1 60); do
            if grep -q "Done" server_output.txt 2>/dev/null; then
              echo "Server started successfully!"
              break
            fi
            sleep 5
            echo "Waiting... ($i/60)"
          done
          
          # Show server output
          echo "=== Server output (last 30 lines) ==="
          tail -30 server_output.txt
          
          # Show playit tunnel info
          echo ""
          echo "=== Tunnel info ==="
          cat ../playit_output.txt 2>/dev/null || true
          playit list 2>&1 || true
          
          # Get the public IP of the runner
          echo ""
          echo "=== Runner public IP ==="
          curl -s ifconfig.me || true
          echo ""
          
          # Keep server alive for specified duration
          echo ""
          echo "Server is running. Keeping alive for ${{ github.event.inputs.duration }} hours..."
          
          # Sleep in increments to keep workflow alive
          HOURS=${{ github.event.inputs.duration }}
          TOTAL_SECONDS=$((HOURS * 3600))
          SLEEP_INTERVAL=300
          ELAPSED=0
          
          while [ $ELAPSED -lt $TOTAL_SECONDS ]; do
            sleep $SLEEP_INTERVAL
            ELAPSED=$((ELAPSED + SLEEP_INTERVAL))
            REMAINING=$((TOTAL_SECONDS - ELAPSED))
            echo "[$(date)] Server running... $((REMAINING / 60)) minutes remaining"
            
            # Check if server is still alive
            if ! kill -0 $SERVER_PID 2>/dev/null; then
              echo "Server process died! Output:"
              tail -50 server_output.txt
              break
            fi
          done
          
          echo "Time's up. Stopping server..."
          kill $SERVER_PID 2>/dev/null || true
          sleep 5
          echo "Server stopped."
      
      - name: Show connection info
        run: |
          echo "============================================"
          echo "  HopNeo SMP Server - Connection Info"
          echo "============================================"
          echo ""
          echo "Tunnel address (from playit.gg):"
          cat server/../playit_output.txt 2>/dev/null | grep -oP '[\w-]+\.playit\.gg:\d+' || echo "Check playit output above"
          echo ""
          echo "Runner public IP:"
          curl -s ifconfig.me
          echo ""
          echo "============================================"
          echo "  Connect using the playit.gg address"
          echo "  OR direct IP if firewall allows"
          echo "============================================"
