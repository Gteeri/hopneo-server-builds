name: Run SMP Server (3h test)
on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'Hours to run'
        required: true
        default: '3'

jobs:
  run-server:
    runs-on: ubuntu-latest
    timeout-minutes: 200
    
    steps:
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      
      - name: Download and setup server
        run: |
          curl -L -o SMP-build.zip "https://github.com/Gteeri/hopneo-server-builds/releases/download/v1.0/SMP-build.zip"
          python3 -c "import zipfile; zipfile.ZipFile('SMP-build.zip').extractall('server')"
          rm -f server/folia.jar
          curl -L -o server/paper.jar "https://api.papermc.io/v2/projects/paper/versions/1.21.11/builds/132/downloads/paper-1.21.11-132.jar"
          cd server
          sed -i 's/server-port=25567/server-port=25565/' server.properties
          sed -i 's/view-distance=10/view-distance=4/' server.properties
          sed -i 's/simulation-distance=10/simulation-distance=4/' server.properties
          sed -i 's/max-players=200/max-players=20/' server.properties
          echo "eula=true" > eula.txt
          # Remove plugins that slow down startup
          rm -f plugins/VirtualSpawners.jar
          rm -f plugins/HopAuction.jar
          echo "Server ready"
      
      - name: Install ngrok
        run: |
          curl -sSL https://ngrok-agent.s3.amazonaws.com/ngrok-v3-stable-linux-amd64.tgz | sudo tar -xz -C /usr/local/bin
          ngrok version
      
      - name: Start ngrok tunnel
        run: |
          ngrok tcp 25565 --log=stdout --log-format=logfmt > ngrok.log 2>&1 &
          sleep 10
          # Get tunnel address from ngrok API
          TUNNEL=$(curl -s http://127.0.0.1:4040/api/tunnels | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['tunnels'][0]['public_url'])" 2>/dev/null || echo "unknown")
          echo "NGROK_TUNNEL=$TUNNEL" >> $GITHUB_ENV
          echo "=== Ngrok tunnel: $TUNNEL ==="
          cat ngrok.log | tail -5
      
      - name: Start server and keep alive
        run: |
          cd server
          nohup java -Xms1G -Xmx3G -XX:+UseG1GC -jar paper.jar nogui > server_output.txt 2>&1 &
          SERVER_PID=$!
          echo "Server PID: $SERVER_PID"
          
          # Wait up to 10 minutes for server to start
          echo "Waiting for server..."
          for i in $(seq 1 120); do
            if grep -q "Done" server_output.txt 2>/dev/null; then
              echo "=== SERVER STARTED ==="
              break
            fi
            sleep 5
          done
          
          # Show server status
          echo "=== Server output (last 20 lines) ==="
          tail -20 server_output.txt
          
          # Show tunnel
          echo ""
          echo "============================================"
          echo "  CONNECT TO: ${{ env.NGROK_TUNNEL }}"
          echo "  (replace tcp:// with direct address)"
          echo "============================================"
          
          # Keep alive
          HOURS=${{ github.event.inputs.duration }}
          END=$((SECONDS + HOURS * 3600))
          while [ $SECONDS -lt $END ]; do
            sleep 60
            if ! kill -0 $SERVER_PID 2>/dev/null; then
              echo "Server died! Output:"
              tail -30 server_output.txt
              break
            fi
            REMAINING=$(( (END - SECONDS) / 60 ))
            echo "[$(date)] Running... ${REMAINING}min left"
          done
          
          echo "Stopping..."
          kill $SERVER_PID 2>/dev/null || true
